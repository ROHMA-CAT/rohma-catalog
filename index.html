<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ROHMA Admin</title>
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
</head>
<body>
  <script>
    // Process invite/recovery tokens BEFORE loading CMS
    var hash = window.location.hash;
    if (hash && (hash.indexOf('invite_token') > -1 || hash.indexOf('recovery_token') > -1)) {
      var token = hash.split('=')[1];
      var type = hash.indexOf('invite_token') > -1 ? 'invite' : 'recovery';
      window.netlifyIdentity.open(type);
      window.netlifyIdentity.on('login', function() {
        document.location.href = '/admin/';
      });
    } else {
      // Normal CMS load
      var script = document.createElement('script');
      script.src = 'https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js';
      document.body.appendChild(script);
    }
  </script>
</body>
</html>
