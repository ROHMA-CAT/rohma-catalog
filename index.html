<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ROHMA Admin</title>
</head>
<body>
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
  <script src="https://unpkg.com/netlify-cms@^2.0.0/dist/netlify-cms.js"></script>
  <script>
    // Handle invite and recovery tokens before CMS loads
    if (window.location.hash) {
      const hash = window.location.hash;
      if (hash.includes('invite_token') || hash.includes('recovery_token')) {
        // Move token to the root page so identity widget can handle it
        window.location.href = '/' + hash;
      }
    }
    window.netlifyIdentity && window.netlifyIdentity.on('init', function(user) {
      if (!user) {
        window.netlifyIdentity.on('login', function() {
          document.location.href = '/admin/';
        });
      }
    });
  </script>
</body>
</html>
